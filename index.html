<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROME TETRIS | ANDSEETHINGSASIDO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030303;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111111 0%, #030303 100%);
        }

        /* 游戏主容器：硬朗重工业外框 */
        .game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.03), inset 0 0 20px rgba(0,0,0,0.8);
            border: 4px solid #1f1f1f;
            background-color: #000000;
            border-radius: 2px;
        }

        canvas {
            display: block;
        }

        /* 顶层工业状态文字 */
        .status-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 10px;
            letter-spacing: 3px;
            color: #444444;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameContainer">
        <div class="status-overlay" id="statusText">SYSTEM // AUTOMATIC_STACKING</div>
        <canvas id="tetris"></canvas>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');

    // 🚨 完美正方形重构：10行×10列的绝对正方形舞台
    const COLS = 10;
    const ROWS = 10;
    const BLOCK_SIZE = 45; // 放大单块尺寸，让浮雕与镭射细节更清晰显现

    canvas.width = COLS * BLOCK_SIZE;
    canvas.height = ROWS * BLOCK_SIZE;

    // 预加载 Logo 图片
    const logoImg = new Image();
    logoImg.src = 'logo.png'; 
    let logoLoaded = false;
    logoImg.onload = () => { logoLoaded = true; };
    logoImg.onerror = () => { logoLoaded = false; };

    // 网格数据
    const board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

    let piece = null;
    let isAutoMode = true; 
    let dropCounter = 0;
    let dropInterval = 100; 
    let lastTime = 0;
    let isFinished = false;
    let laserHue = 0; // 用于驱动动态镭射彩虹反射的时间变量

    // 自动模式下强制生成最规整的几何体
    function createPiece() {
        const shape = Math.random() > 0.5 ? [[1, 1], [1, 1]] : [[1, 1, 1, 1]];
        return {
            matrix: shape,
            x: Math.floor((COLS - shape[0].length) / 2),
            y: 0
        };
    }

    function collide(board, piece) {
        const [m, o] = [piece.matrix, piece];
        for (let r = 0; r < m.length; ++r) {
            for (let c = 0; c < m[r].length; ++c) {
                if (m[r][c] !== 0 && (board[r + o.y] && board[r + o.y][c + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function merge(board, piece) {
        piece.matrix.forEach((row, r) => {
            row.forEach((value, c) => {
                if (value !== 0) board[r + piece.y][c + piece.x] = 1;
            });
        });
    }

    function playerDrop() {
        if (isFinished) return;
        piece.y++;
        if (collide(board, piece)) {
            piece.y--;
            merge(board, piece);
            
            if (!isAutoMode) clearLines();

            if (isAutoMode && checkFilled()) {
                isFinished = true;
                statusText.textContent = "EMBOSSED LOGO LOCKED.";
                statusText.style.color = "#888888";
                return;
            }
            piece = createPiece();
            if (collide(board, piece)) {
                isFinished = true;
                statusText.textContent = "OVERLOAD. CLICK TO RESET";
            }
        }
        dropCounter = 0;
    }

    function clearLines() {
        outer: for (let r = ROWS - 1; r >= 0; --r) {
            for (let c = 0; c < COLS; ++c) {
                if (board[r][c] === 0) continue outer;
            }
            const row = board.splice(r, 1)[0].fill(0);
            board.unshift(row);
            ++r;
        }
    }

    function checkFilled() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === 0) return false;
            }
        }
        return true;
    }

    // 砌砖AI：从下至上完美填满正方形
    function autoPlayAI() {
        if (!piece || !isAutoMode || isFinished) return;
        let targetRow = -1, targetCol = -1, found = false;
        for (let r = ROWS - 1; r >= 0; r--) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === 0) {
                    targetRow = r; targetCol = c; found = true; break;
                }
            }
            if (found) break;
        }
        if (!found) return;

        if (piece.x < targetCol) {
            piece.x++; if (collide(board, piece)) piece.x--;
        } else if (piece.x > targetCol) {
            piece.x--; if (collide(board, piece)) piece.x++;
        }
        dropInterval = (piece.x === targetCol) ? 30 : 100;
    }

    // 🎨 高级工业级材质渲染引擎
    function drawBlock(x, y, isStatic) {
        const px = x * BLOCK_SIZE;
        const py = y * BLOCK_SIZE;

        if (isStatic) {
            // ==========================================
            // 【固定的方块】：生锈金属衬底 + 3D凹凸浮雕烙印 Logo
            // ==========================================
            ctx.save();
            
            // 建立方块物理范围裁剪区
            ctx.beginPath();
            ctx.rect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            ctx.clip();

            if (logoLoaded) {
                // 1. 底层：绘制略微暗淡、带铁锈氧化的金属基底
                ctx.drawImage(logoImg, 0, 0, canvas.width, canvas.height);
                
                // 叠加一层斑驳的铁锈、氧化暗斑滤镜
                let rustGrad = ctx.createRadialGradient(px+BLOCK_SIZE/2, py+BLOCK_SIZE/2, 2, px+BLOCK_SIZE/2, py+BLOCK_SIZE/2, BLOCK_SIZE);
                rustGrad.addColorStop(0, 'rgba(35, 25, 20, 0.2)'); // 铁锈微红
                rustGrad.addColorStop(1, 'rgba(0, 0, 0, 0.45)');   // 边缘重度氧化
                ctx.fillStyle = rustGrad;
                ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);

                // 2. 核心：双重滤镜叠加实现“深嵌入式”与“隆起浮雕”质感
                ctx.restore(); // 暂时跳出硬裁剪，进行全画幅浮雕阴影计算
                ctx.save();
                ctx.beginPath();
                ctx.rect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                ctx.clip();

                // 亮部突起斜切面 (135度光照带来的白色高光边缘)
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 2;
                ctx.shadowOffsetX = -1.5;
                ctx.shadowOffsetY = -1.5;
                
                // 暗部沉降凹陷面 (右下角的深黑色烙印投影)
                ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.shadowBlur = 3;

                // 重新绘制一次，使阴影只在边缘锐利切割，产生钢铁烙印的激凸立体感
                ctx.globalCompositeOperation = 'source-atop';
                ctx.drawImage(logoImg, 0, 0, canvas.width, canvas.height);
            } else {
                // 没图时的生锈金属替代色
                ctx.fillStyle = '#1c1a17';
                ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
            }
            ctx.restore();

            // 工业拼接铆缝
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.lineWidth = 1;
            ctx.strokeRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.strokeRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);

        } else {
            // ==========================================
            // 【下落中的方块】：极致液态亮银 + 动态镭射彩虹反射
            // ==========================================
            ctx.save();
            
            // 1. 创建亮银金属镜面质感的底色渐变
            let chromeGrad = ctx.createLinearGradient(px, py, px + BLOCK_SIZE, py + BLOCK_SIZE);
            chromeGrad.addColorStop(0, '#ffffff'); // 耀眼白光
            chromeGrad.addColorStop(0.2, '#d0d5dd'); // 铬银冷色
            chromeGrad.addColorStop(0.4, '#777e8a'); // 深钛灰中段
            chromeGrad.addColorStop(0.5, '#eceff3'); // 次级镜面光
            chromeGrad.addColorStop(0.8, '#3a3f47'); // 极深暗部
            chromeGrad.addColorStop(1, '#686f7c');
            
            ctx.fillStyle = chromeGrad;
            ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);

            // 2. 镭射效果优化 (Holographic Laser Overlay)
            // 叠加一层半透明的动态彩虹折射光，色彩和位置会根据时间（laserHue）平滑流动
            let laserGrad = ctx.createLinearGradient(px - BLOCK_SIZE, py, px + BLOCK_SIZE * 2, py + BLOCK_SIZE);
            let h = laserHue;
            laserGrad.addColorStop(0, `hsla(${h}, 85%, 65%, 0.0)`);
            laserGrad.addColorStop(0.3, `hsla(${(h+60)%360}, 90%, 65%, 0.25)`); // 幻彩霓虹绿/青
            laserGrad.addColorStop(0.6, `hsla(${(h+180)%360}, 90%, 60%, 0.3)`); // 幻彩紫/红
            laserGrad.addColorStop(1, `hsla(${(h+300)%360}, 85%, 65%, 0.0)`);
            
            ctx.fillStyle = laserGrad;
            ctx.globalCompositeOperation = 'color-burn'; // 烧灼混合模式，让镭射颜色生动渗入银色中
            ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
            ctx.globalCompositeOperation = 'source-over';

            // 3. 镀铬镜面极为锐利的反射亮边 (Chiseled Edge)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; // 极亮顶边
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(px, py + BLOCK_SIZE);
            ctx.lineTo(px, py);
            ctx.lineTo(px + BLOCK_SIZE, py);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)'; // 暗沉底边
            ctx.beginPath();
            ctx.moveTo(px + BLOCK_SIZE, py);
            ctx.lineTo(px + BLOCK_SIZE, py + BLOCK_SIZE);
            ctx.lineTo(px, py + BLOCK_SIZE);
            ctx.stroke();
            
            ctx.restore();
        }
    }

    function draw() {
        // 深邃哑光炭黑背景，衬托上层金属
        ctx.fillStyle = '#0a0a0b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 微弱的机械网格刻度线
        ctx.strokeStyle = '#141416';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath(); ctx.moveTo(i * BLOCK_SIZE, 0); ctx.lineTo(i * BLOCK_SIZE, canvas.height); ctx.stroke();
        }
        for (let j = 0; j <= ROWS; j++) {
            ctx.beginPath(); ctx.moveTo(0, j * BLOCK_SIZE); ctx.lineTo(canvas.width, j * BLOCK_SIZE); ctx.stroke();
        }

        // 渲染已固定阵列
        board.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) drawBlock(x, y, true);
            });
        });

        // 渲染活动镭射块
        if (piece && !isFinished) {
            piece.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) drawBlock(piece.x + x, piece.y + y, false);
                });
            });
        }
    }

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        // 驱动镭射效果色彩位移
        laserHue = (laserHue + 0.8) % 360;

        if (!isFinished) {
            dropCounter += deltaTime;
            if (isAutoMode) autoPlayAI();
            if (dropCounter > dropInterval) playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    function startManualMode() {
        board.forEach(row => row.fill(0));
        isAutoMode = false;
        isFinished = false;
        dropInterval = 800; 
        statusText.textContent = "MANUAL CONTROLS // LIVE";
        statusText.style.color = "#ffffff";
        piece = createPiece();
    }

    document.getElementById('gameContainer').addEventListener('click', () => {
        if (isAutoMode || isFinished) startManualMode();
    });

    window.addEventListener('keydown', event => {
        if (isAutoMode || isFinished) return;
        if (event.key === 'ArrowLeft' || event.key === 'a') {
            piece.x--; if (collide(board, piece)) piece.x++;
        } else if (event.key === 'ArrowRight' || event.key === 'd') {
            piece.x++; if (collide(board, piece)) piece.x--;
        } else if (event.key === 'ArrowDown' || event.key === 's') {
            playerDrop();
        } else if (event.key === 'ArrowUp' || event.key === 'w') {
            const rotate = (matrix) => matrix[0].map((val, index) => matrix.map(row => row[index]).reverse());
            const oldMatrix = piece.matrix;
            piece.matrix = rotate(piece.matrix);
            if (collide(board, piece)) piece.matrix = oldMatrix;
        }
    });

    piece = createPiece();
    update();
</script>
</body>
</html>
