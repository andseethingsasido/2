<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE MINIMALIST TETRIS | ANDSEETHINGSASIDO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030303;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111111 0%, #030303 100%);
        }

        /* 游戏主容器：极简黑白线条 */
        .game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.02);
            border: 2px solid #222222;
            background-color: #000000;
        }

        canvas {
            display: block;
        }

        /* 极简工业状态文字 */
        .status-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #444444;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameContainer">
        <div class="status-overlay" id="statusText">SYSTEM // GRID_8X8_AUTO</div>
        <canvas id="tetris"></canvas>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');

    // 📐 严格重构为 8×8 的完美正方形阵列
    const COLS = 8;
    const ROWS = 8;
    const BLOCK_SIZE = 55; // 适配 8x8 布局，放大方块让画面更饱满

    canvas.width = COLS * BLOCK_SIZE;
    canvas.height = ROWS * BLOCK_SIZE;

    // 预加载 Logo 图片
    const logoImg = new Image();
    logoImg.src = 'logo.png'; 
    let logoLoaded = false;
    logoImg.onload = () => { logoLoaded = true; };

    // 网格数据
    const board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

    let piece = null;
    let isAutoMode = true; 
    let dropCounter = 0;
    let dropInterval = 120; 
    let lastTime = 0;
    let isFinished = false;

    // 确保自动铺满的完美几何体包
    function createPiece() {
        // 自动模式下只生成最规整的 2x2 方块 和 1x4 长条，确保完美闭合
        const shape = Math.random() > 0.5 ? [[1, 1], [1, 1]] : [[1, 1, 1, 1]];
        return {
            matrix: shape,
            x: Math.floor((COLS - shape[0].length) / 2),
            y: 0
        };
    }

    function collide(board, piece) {
        const [m, o] = [piece.matrix, piece];
        for (let r = 0; r < m.length; ++r) {
            for (let c = 0; c < m[r].length; ++c) {
                if (m[r][c] !== 0 && (board[r + o.y] && board[r + o.y][c + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function merge(board, piece) {
        piece.matrix.forEach((row, r) => {
            row.forEach((value, c) => {
                if (value !== 0) board[r + piece.y][c + piece.x] = 1;
            });
        });
    }

    function playerDrop() {
        if (isFinished) return;
        piece.y++;
        if (collide(board, piece)) {
            piece.y--;
            merge(board, piece);
            
            if (!isAutoMode) clearLines();

            if (isAutoMode && checkFilled()) {
                isFinished = true;
                statusText.textContent = "MATRIX LOCKED.";
                statusText.style.color = "#666666";
                return;
            }
            piece = createPiece();
            if (collide(board, piece)) {
                isFinished = true;
                statusText.textContent = "COMPLETED // OVERFLOW";
            }
        }
        dropCounter = 0;
    }

    function clearLines() {
        outer: for (let r = ROWS - 1; r >= 0; --r) {
            for (let c = 0; c < COLS; ++c) {
                if (board[r][c] === 0) continue outer;
            }
            const row = board.splice(r, 1)[0].fill(0);
            board.unshift(row);
            ++r;
        }
    }

    function checkFilled() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === 0) return false;
            }
        }
        return true;
    }

    // 8x8 高精准自动砌砖算法
    function autoPlayAI() {
        if (!piece || !isAutoMode || isFinished) return;
        let targetRow = -1, targetCol = -1, found = false;
        
        // 自底向上搜索空缺
        for (let r = ROWS - 1; r >= 0; r--) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] === 0) {
                    targetRow = r; targetCol = c; found = true; break;
                }
            }
            if (found) break;
        }
        if (!found) return;

        // 水平对齐空缺位置
        if (piece.x < targetCol) {
            piece.x++; if (collide(board, piece)) piece.x--;
        } else if (piece.x > targetCol) {
            piece.x--; if (collide(board, piece)) piece.x++;
        }
        
        // 锁定时加速下落，对齐时保持稳定节奏
        dropInterval = (piece.x === targetCol) ? 30 : 120;
    }

    // 🎨 纯白极简方块渲染
    function drawBlock(x, y, isStatic) {
        const px = x * BLOCK_SIZE;
        const py = y * BLOCK_SIZE;

        if (isStatic) {
            // 【固定后的方块】：纯白色，背后衬托等比例不失真的 Logo
            ctx.save();
            
            // 建立方块物理区裁剪
            ctx.beginPath();
            ctx.rect(px, py, BLOCK_SIZE, BLOCK_SIZE);
            ctx.clip();

            if (logoLoaded) {
                // 🔒 【等比例防变形算法】 (Aspect Ratio Protection)
                const canvasAspect = canvas.width / canvas.height;
                const imgAspect = logoImg.width / logoImg.height;
                let drawWidth, drawHeight, drawX, drawY;

                if (imgAspect > canvasAspect) {
                    // 图片过宽，以高度为基准缩放，水平居中裁剪
                    drawHeight = canvas.height;
                    drawWidth = canvas.height * imgAspect;
                    drawX = (canvas.width - drawWidth) / 2;
                    drawY = 0;
                } else {
                    // 图片过高，以宽度为基准缩放，垂直居中裁剪
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / imgAspect;
                    drawX = 0;
                    drawY = (canvas.height - drawHeight) / 2;
                }

                ctx.drawImage(logoImg, drawX, drawY, drawWidth, drawHeight);

                // 叠加一层高级的白色滤镜，使底层照片融合成“白底极简纹理”
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                // 若没有 Logo 则显示最纯粹的现代主义冷白
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
            }
            ctx.restore();

            // 极细的暗黑色方块拼接缝，让白色方块的模块化矩阵感拉满
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(px, py, BLOCK_SIZE, BLOCK_SIZE);

        } else {
            // 【下落中的方块】：绝对的纯白色
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
            
            // 拼接线
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(px, py, BLOCK_SIZE, BLOCK_SIZE);
        }
    }

    function draw() {
        // 纯哑光黑背景
        ctx.fillStyle = '#0a0a0b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 极淡的暗底参考网格
        ctx.strokeStyle = '#141416';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath(); ctx.moveTo(i * BLOCK_SIZE, 0); ctx.lineTo(i * BLOCK_SIZE, canvas.height); ctx.stroke();
        }
        for (let j = 0; j <= ROWS; j++) {
            ctx.beginPath(); ctx.moveTo(0, j * BLOCK_SIZE); ctx.lineTo(canvas.width, j * BLOCK_SIZE); ctx.stroke();
        }

        // 绘制固定的白色阵列
        board.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) drawBlock(x, y, true);
            });
        });

        // 绘制活动的白色动态块
        if (piece && !isFinished) {
            piece.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) drawBlock(piece.x + x, piece.y + y, false);
                });
            });
        }
    }

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        if (!isFinished) {
            dropCounter += deltaTime;
            if (isAutoMode) autoPlayAI();
            if (dropCounter > dropInterval) playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    function startManualMode() {
        board.forEach(row => row.fill(0));
        isAutoMode = false;
        isFinished = false;
        dropInterval = 800; // 玩家操控时恢复舒适的慢速
        statusText.textContent = "MANUAL MODE // ACTIVE";
        statusText.style.color = "#ffffff";
        piece = createPiece();
    }

    document.getElementById('gameContainer').addEventListener('click', () => {
        if (isAutoMode || isFinished) startManualMode();
    });

    window.addEventListener('keydown', event => {
        if (isAutoMode || isFinished) return;
        if (event.key === 'ArrowLeft' || event.key === 'a') {
            piece.x--; if (collide(board, piece)) piece.x++;
        } else if (event.key === 'ArrowRight' || event.key === 'd') {
            piece.x++; if (collide(board, piece)) piece.x--;
        } else if (event.key === 'ArrowDown' || event.key === 's') {
            playerDrop();
        } else if (event.key === 'ArrowUp' || event.key === 'w') {
            const rotate = (matrix) => matrix[0].map((val, index) => matrix.map(row => row[index]).reverse());
            const oldMatrix = piece.matrix;
            piece.matrix = rotate(piece.matrix);
            if (collide(board, piece)) piece.matrix = oldMatrix;
        }
    });

    piece = createPiece();
    update();
</script>
</body>
</html>
